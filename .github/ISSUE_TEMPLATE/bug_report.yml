name: Bug report
description: Report a reproducible problem using synthetic or redacted data only
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach production backups, Walks, screenshots, map or action names, UUIDs,
        coordinates, hostnames, credentials, inspection results, or other site information.
        Build a minimal synthetic reproduction instead.
  - type: input
    id: version
    attributes:
      label: Map Forge version
      placeholder: 0.1.0a1
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: Pipeline stage
      options:
        - inspect
        - prepare
        - plan
        - clone
        - validate
        - export-walk
        - planner UI
        - packaging or installation
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Include commands and a minimal synthetic fixture or pseudodata.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Redact local paths and all operational identifiers from logs.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed all production, personal, customer, and site-identifying information.
          required: true
